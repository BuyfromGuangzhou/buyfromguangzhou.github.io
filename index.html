<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>我们的自我介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 30%, #FFF5E6 70%, #FFE4B5 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 皮克斯风格云朵 - 移到两侧避免遮挡内容 */
        body::before {
            content: '';
            position: fixed;
            top: 15%;
            left: -3%;
            width: 100px;
            height: 50px;
            background: white;
            border-radius: 50px;
            opacity: 0.7;
            box-shadow: 
                35px -15px 0 -8px white,
                70px 8px 0 -18px white;
            animation: float 20s infinite ease-in-out;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 40%;
            right: -2%;
            width: 80px;
            height: 40px;
            background: white;
            border-radius: 40px;
            opacity: 0.6;
            box-shadow: 
                30px -12px 0 -6px white,
                55px 6px 0 -14px white;
            animation: float 25s infinite ease-in-out reverse;
            z-index: -1;
        }

        /* 额外的小云朵 */
        .cloud-extra {
            position: fixed;
            top: 60%;
            left: 2%;
            width: 60px;
            height: 30px;
            background: white;
            border-radius: 30px;
            opacity: 0.5;
            box-shadow: 
                20px -8px 0 -5px white,
                40px 5px 0 -10px white;
            animation: float 30s infinite ease-in-out;
            z-index: -1;
        }

        /* 真实照片头像 */
        .real-boy, .real-girl {
            position: fixed;
            bottom: 100px;
            width: 80px;
            height: 80px;
            z-index: 0;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .real-boy {
            left: 6%;
        }

        .real-girl {
            right: 6%;
        }

        .real-boy img, .real-girl img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 卡通小男孩 - 重新设计 */
        .cartoon-boy {
            position: fixed;
            bottom: 80px;
            left: 8%;
            width: 60px;
            height: 120px;
            z-index: 0;
        }

        /* 男孩头部 */
        .cartoon-boy .head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #FFE4C4 0%, #DEB887 100%);
            border-radius: 50%;
        }

        /* 男孩头发 - 顶部短发 */
        .cartoon-boy .head::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 18px;
            background: #5D3A1A;
            border-radius: 18px 18px 5px 5px;
        }

        /* 男孩眼睛 */
        .cartoon-boy .eyes {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .cartoon-boy .eyes::before,
        .cartoon-boy .eyes::after {
            content: '';
            width: 5px;
            height: 6px;
            background: #222;
            border-radius: 50%;
        }

        /* 男孩眉毛 */
        .cartoon-boy .eyebrows {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .cartoon-boy .eyebrows::before,
        .cartoon-boy .eyebrows::after {
            content: '';
            width: 6px;
            height: 2px;
            background: #5D3A1A;
            border-radius: 2px;
        }

        /* 男孩鼻子 */
        .cartoon-boy .nose {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            background: #D2691E;
            border-radius: 50%;
        }

        /* 男孩嘴巴 - 微笑 */
        .cartoon-boy .mouth {
            position: absolute;
            top: 26px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            border-bottom: 2px solid #E74C3C;
            border-radius: 0 0 12px 12px;
        }

        /* 男孩腮红 */
        .cartoon-boy .cheeks {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 3px;
        }

        .cartoon-boy .cheeks::before,
        .cartoon-boy .cheeks::after {
            content: '';
            width: 5px;
            height: 3px;
            background: rgba(255, 182, 193, 0.7);
            border-radius: 50%;
        }

        /* 男孩身体 - T恤 */
        .cartoon-boy .body {
            position: absolute;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 35px;
            background: linear-gradient(180deg, #3498DB 0%, #2980B9 100%);
            border-radius: 10px 10px 5px 5px;
        }

        /* 男孩手臂 */
        .cartoon-boy .arms {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            display: flex;
            justify-content: space-between;
        }

        .cartoon-boy .arms::before,
        .cartoon-boy .arms::after {
            content: '';
            width: 7px;
            height: 22px;
            background: #FFE4C4;
            border-radius: 4px;
        }

        /* 男孩腿 */
        .cartoon-boy .legs {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            display: flex;
            justify-content: space-between;
        }

        .cartoon-boy .legs::before,
        .cartoon-boy .legs::after {
            content: '';
            width: 8px;
            height: 28px;
            background: #2C3E50;
            border-radius: 0 0 4px 4px;
        }

        .cartoon-girl {

        /* 女孩双马尾 - 左侧 */
        .cartoon-girl .pigtail-left {

            width: 12px;

        /* 女孩双马尾 - 右侧 */

        /* 马尾末端装饰 - 左 */

        /* 马尾末端装饰 - 右 */

        /* 女孩眉毛 */

        /* 女孩鼻子 */

        /* 女孩嘴巴 - 微笑 */

        }

        /* 女孩腮红 */
        .cartoon-girl .cheeks {

            display: flex;

            width: 30px;

            border-radius: 8px 8px 15px 15px;
        }
        }

        /* 女孩手臂 */
        .cartoon-girl .arms {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;

        }

        /* 女孩左手 */
        .cartoon-girl .arms::before {
            content: '';

            background: #FFE4C4;

            transform: rotate(-15deg);

        /* 女孩右手 */
        .cartoon-girl .arms::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 6px;
            height: 20px;
            background: #FFE4C4;
            border-radius: 3px;
            transform: rotate(15deg);
        }

        /* 女孩左手掌 */
        .cartoon-girl .hand-left {
            position: absolute;
            top: 60px;

            background: #FFE4C4;
            border-radius: 50%;
        }

        /* 女孩右手掌 */
        .cartoon-girl .hand-right {
            position: absolute;
            top: 60px;
            right: 6px;
            width: 7px;
            height: 7px;
            background: #FFE4C4;
            border-radius: 50%;
        }

        /* 女孩腿 */
        .cartoon-girl .legs {
            position: absolute;
            top: 78px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            display: flex;
            justify-content: space-between;
        }

        .cartoon-girl .legs::after {
            content: '';
            width: 6px;
            height: 22px;
            background: #FFE4C4;
            border-radius: 0 0 3px 3px;
        }

        /* 装饰太阳 - 更真实的立体效果 */
        .sun {
            position: fixed;
            top: 3%;
            right: 8%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #FFF8DC 0%, #FFD700 20%, #FFA500 60%, #FF8C00 100%);
            border-radius: 50%;
            box-shadow: 
                inset -10px -10px 20px rgba(255, 140, 0, 0.5),
                inset 10px 10px 20px rgba(255, 255, 255, 0.8),
                0 0 60px rgba(255, 215, 0, 0.8),
                0 0 120px rgba(255, 165, 0, 0.4);
            animation: pulse 4s infinite ease-in-out;
            z-index: -1;
        }

        /* 太阳光线 */
        .sun-rays {
            position: fixed;
            top: 3%;
            right: 8%;
            width: 100px;
            height: 100px;
            z-index: -2;
        }

        .sun-rays::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 215, 0, 0.3) 10deg,
                transparent 20deg,
                transparent 40deg,
                rgba(255, 215, 0, 0.3) 50deg,
                transparent 60deg,
                transparent 80deg,
                rgba(255, 215, 0, 0.3) 90deg,
                transparent 100deg,
                transparent 120deg,
                rgba(255, 215, 0, 0.3) 130deg,
                transparent 140deg,
                transparent 160deg,
                rgba(255, 215, 0, 0.3) 170deg,
                transparent 180deg,
                transparent 200deg,
                rgba(255, 215, 0, 0.3) 210deg,
                transparent 220deg,
                transparent 240deg,
                rgba(255, 215, 0, 0.3) 250deg,
                transparent 260deg,
                transparent 280deg,
                rgba(255, 215, 0, 0.3) 290deg,
                transparent 300deg,
                transparent 320deg,
                rgba(255, 215, 0, 0.3) 330deg,
                transparent 340deg,
                transparent 360deg
            );
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        /* 装饰山丘 */
        .hills {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(180deg, #90EE90 0%, #7CFC00 100%);
            border-radius: 50% 50% 0 0 / 100px 100px 0 0;
            z-index: -1;
        }

        .hills::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -20%;
            width: 80%;
            height: 150px;
            background: linear-gradient(180deg, #98FB98 0%, #32CD32 100%);
            border-radius: 50% 50% 0 0 / 80px 80px 0 0;
        }

        .hills::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -10%;
            width: 70%;
            height: 120px;
            background: linear-gradient(180deg, #ADFF2F 0%, #228B22 100%);
            border-radius: 50% 50% 0 0 / 60px 60px 0 0;
        }

        @keyframes float {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(20px) translateY(-10px); }
            50% { transform: translateX(-10px) translateY(5px); }
            75% { transform: translateX(15px) translateY(-5px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

</head>
