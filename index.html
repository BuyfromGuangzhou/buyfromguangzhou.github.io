<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创和卓的作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            margin-bottom: 50px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            width: 260px;
            text-decoration: none;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.25);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 16px 18px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        .card-date {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>创和卓的作品</h1>
    <p class="subtitle">每一个小项目，都是一次大冒险</p>

    <div class="grid">
        <a class="card" href="guess_number/">
            <img class="card-img" src="https://images.unsplash.com/photo-1596495578065-6e0763fa1178?w=400&h=300&fit=crop" alt="猜数字">
            <div class="card-body">
                <div class="card-title">猜数字大战</div>
                <div class="card-desc">卓和创同台竞技，看谁先猜中神秘数字！</div>
                <div class="card-date">第1周 · 2026年4月</div>
            </div>
        </a>

        <a class="card" href="about/">
            <img class="card-img" src="about/avatar_preview.jpg" alt="关于我们" onerror="this.src='https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&h=300&fit=crop'">
            <div class="card-body">
                <div class="card-title">自我介绍</div>
                <div class="card-desc">我们是创和卓，欢迎来到我们的世界！</div>
                <div class="card-date">2026年3月</div>
            </div>
        </a>
    </div>
</body>
</html>
